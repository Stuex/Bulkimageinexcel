<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bulk Image to Excel Exporter</title>
    <!-- Include ExcelJS and FileSaver libraries via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        /* Mobile-friendly and Dark Mode Reset */
        * { box-sizing: border-box; }
        body { 
            font-family: sans-serif; 
            margin: 0; 
            padding: 15px; 
            background-color: #000000; /* Black background */
            color: #ffffff; /* White text */
        }
        
        .container { 
            width: 100%; 
            max-width: 600px; 
            margin: 0 auto; 
            padding: 20px; 
            border: 2px solid #ffffff; /* White box outline */
            border-radius: 8px; 
        }

        h2, p { text-align: center; }

        .actions { 
            display: flex; 
            flex-direction: column; /* Stacks nicely on mobile screens */
            gap: 15px; 
            margin-bottom: 20px; 
        }

        button, input[type="file"] { 
            width: 100%; 
            padding: 15px; 
            font-size: 16px; 
            cursor: pointer; 
            background-color: #000000;
            color: #ffffff;
            border: 2px solid #ffffff; /* White box outline for inputs */
            border-radius: 4px;
            text-align: center;
        }

        button:hover:not(:disabled) { background-color: #333333; }
        button:disabled { border-color: #555555; color: #555555; cursor: not-allowed; }

        /* Table styling for dark theme */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ffffff; padding: 10px; text-align: center; }
        img { max-width: 80px; max-height: 80px; object-fit: contain; }
    </style>
</head>
<body>

<div class="container">
    <h2>Image to Excel</h2>
    <p>Select images. Left is Front (A), Right is Back (B).</p>
    
    <div class="actions">
        <input type="file" id="imageInput" multiple accept="image/*">
        <button id="downloadBtn" disabled>Download Excel File</button>
    </div>

    <table id="previewTable" style="display:none;">
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    const imageInput = document.getElementById('imageInput');
    const downloadBtn = document.getElementById('downloadBtn');
    const previewTable = document.getElementById('previewTable');
    const tableBody = document.getElementById('tableBody');
    
    let uploadedFiles = [];

    // 1. Handle Image Selection & Preview Layout
    imageInput.addEventListener('change', (e) => {
        uploadedFiles = Array.from(e.target.files);
        tableBody.innerHTML = '';
        
        if (uploadedFiles.length === 0) {
            downloadBtn.disabled = true;
            previewTable.style.display = 'none';
            return;
        }

        downloadBtn.disabled = false;
        previewTable.style.display = 'table';

        // Loop through files to preview
        for (let i = 0; i < uploadedFiles.length; i += 2) {
            const row = document.createElement('tr');
            
            // Front Image
            const frontCell = document.createElement('td');
            createImagePreview(uploadedFiles[i], frontCell);
            row.appendChild(frontCell);

            // Back Image
            const backCell = document.createElement('td');
            if (uploadedFiles[i + 1]) {
                createImagePreview(uploadedFiles[i + 1], backCell);
            } else {
                backCell.textContent = "-";
            }
            row.appendChild(backCell);
            tableBody.appendChild(row);
        }
    });

    function createImagePreview(file, container) {
        const img = document.createElement('img');
        img.src = URL.createObjectURL(file);
        container.appendChild(img);
    }

    const readFileAsBuffer = (file) => {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => resolve(e.target.result);
            reader.readAsArrayBuffer(file);
        });
    };

    // 2. Generate and Download Excel (Headers removed, Strict Anchoring applied)
    downloadBtn.addEventListener('click', async () => {
        downloadBtn.textContent = 'Generating...';
        downloadBtn.disabled = true;

        const workbook = new ExcelJS.Workbook();
        const worksheet = workbook.addWorksheet('Images');

        // Set column widths without defining headers
        worksheet.getColumn(1).width = 25; // Column A
        worksheet.getColumn(2).width = 25; // Column B

        for (let i = 0; i < uploadedFiles.length; i += 2) {
            const excelRowNum = Math.floor(i / 2) + 1; // Starts strictly at row 1
            const row = worksheet.getRow(excelRowNum);
            row.height = 120; // Ensure the cell is tall enough for the image

            // Insert Front Image (Col A)
            if (uploadedFiles[i]) {
                const buffer = await readFileAsBuffer(uploadedFiles[i]);
                const imageId = workbook.addImage({
                    buffer: buffer,
                    extension: uploadedFiles[i].type.split('/')[1] || 'png',
                });
                // Use precise top-left (tl) and bottom-right (br) bounds to lock image inside the cell
                worksheet.addImage(imageId, {
                    tl: { col: 0, row: excelRowNum - 1 },
                    br: { col: 1, row: excelRowNum },
                    editAs: 'oneCell' 
                });
            }

            // Insert Back Image (Col B)
            if (uploadedFiles[i + 1]) {
                const buffer = await readFileAsBuffer(uploadedFiles[i + 1]);
                const imageId = workbook.addImage({
                    buffer: buffer,
                    extension: uploadedFiles[i + 1].type.split('/')[1] || 'png',
                });
                worksheet.addImage(imageId, {
                    tl: { col: 1, row: excelRowNum - 1 },
                    br: { col: 2, row: excelRowNum },
                    editAs: 'oneCell'
                });
            }
        }

        const buffer = await workbook.xlsx.writeBuffer();
        saveAs(new Blob([buffer]), "Gallery_Export.xlsx");

        downloadBtn.textContent = 'Download Excel File';
        downloadBtn.disabled = false;
    });
</script>

</body>
</html>
