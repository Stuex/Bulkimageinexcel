<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Image to Excel Exporter</title>
    <!-- Include ExcelJS and FileSaver libraries via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 30px; background: #f4f6f9; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .actions { margin-bottom: 20px; display: flex; gap: 10px; }
        button, input[type="file"] { padding: 10px 15px; font-size: 14px; cursor: pointer; }
        button { background-color: #217346; color: white; border: none; border-radius: 4px; font-weight: bold; }
        button:hover { background-color: #1a5c38; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #eaeaea; }
        img { max-width: 100px; max-height: 100px; object-fit: contain; }
    </style>
</head>
<body>

<div class="container">
    <h2>Bulk Image to Excel (Front/Back)</h2>
    <p>Select multiple images from your gallery. They will automatically sort into Front (Col A) and Back (Col B).</p>
    
    <div class="actions">
        <input type="file" id="imageInput" multiple accept="image/*">
        <button id="downloadBtn" disabled>Download Excel File</button>
    </div>

    <table id="previewTable" style="display:none;">
        <thead>
            <tr>
                <th>Row</th>
                <th>Column A (Front)</th>
                <th>Column B (Back)</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    const imageInput = document.getElementById('imageInput');
    const downloadBtn = document.getElementById('downloadBtn');
    const previewTable = document.getElementById('previewTable');
    const tableBody = document.getElementById('tableBody');
    
    let uploadedFiles = [];

    // 1. Handle Image Selection & Preview Layout
    imageInput.addEventListener('change', (e) => {
        uploadedFiles = Array.from(e.target.files);
        tableBody.innerHTML = '';
        
        if (uploadedFiles.length === 0) {
            downloadBtn.disabled = true;
            previewTable.style.display = 'none';
            return;
        }

        downloadBtn.disabled = false;
        previewTable.style.display = 'table';

        // Loop through files and organize them into rows of pairs (Front / Back)
        for (let i = 0; i < uploadedFiles.length; i += 2) {
            const row = document.createElement('tr');
            
            // Row number cell
            const rowNumCell = document.createElement('td');
            rowNumCell.textContent = Math.floor(i / 2) + 1;
            row.appendChild(rowNumCell);

            // Front Column (Even indices: 0, 2, 4...)
            const frontCell = document.createElement('td');
            createImagePreview(uploadedFiles[i], frontCell);
            row.appendChild(frontCell);

            // Back Column (Odd indices: 1, 3, 5...)
            const backCell = document.createElement('td');
            if (uploadedFiles[i + 1]) {
                createImagePreview(uploadedFiles[i + 1], backCell);
            } else {
                backCell.textContent = "-";
            }
            row.appendChild(backCell);
            tableBody.appendChild(row);
        }
    });

    function createImagePreview(file, container) {
        const img = document.createElement('img');
        img.src = URL.createObjectURL(file);
        container.appendChild(img);
    }

    // Helper to read file as ArrayBuffer for ExcelJS
    const readFileAsBuffer = (file) => {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => resolve(e.target.result);
            reader.readAsArrayBuffer(file);
        });
    };

    // 2. Generate and Download Excel with Embedded Images
    downloadBtn.addEventListener('click', async () => {
        downloadBtn.textContent = 'Generating...';
        downloadBtn.disabled = true;

        const workbook = new ExcelJS.Workbook();
        const worksheet = workbook.addWorksheet('Images');

        // Set up columns and basic widths
        worksheet.columns = [
            { header: 'Column A (Front)', key: 'front', width: 25 },
            { header: 'Column B (Back)', key: 'back', width: 25 }
        ];

        // Format header row style
        worksheet.getRow(1).height = 25;
        worksheet.getRow(1).font = { bold: true };

        // Process images into rows
        for (let i = 0; i < uploadedFiles.length; i += 2) {
            const excelRowNum = Math.floor(i / 2) + 2; // +2 because Excel rows start at 1 and Row 1 is headers
            const row = worksheet.getRow(excelRowNum);
            row.height = 100; // Give cells enough height to display the image nicely

            // Insert Front Image (Col A / Column index 0)
            if (uploadedFiles[i]) {
                const buffer = await readFileAsBuffer(uploadedFiles[i]);
                const imageId = workbook.addImage({
                    buffer: buffer,
                    extension: uploadedFiles[i].type.split('/')[1] || 'png',
                });
                worksheet.addImage(imageId, {
                    tl: { col: 0, row: excelRowNum - 1 },
                    ext: { width: 150, height: 120 },
                    editAs: 'oneCell'
                });
            }

            // Insert Back Image (Col B / Column index 1)
            if (uploadedFiles[i + 1]) {
                const buffer = await readFileAsBuffer(uploadedFiles[i + 1]);
                const imageId = workbook.addImage({
                    buffer: buffer,
                    extension: uploadedFiles[i + 1].type.split('/')[1] || 'png',
                });
                worksheet.addImage(imageId, {
                    tl: { col: 1, row: excelRowNum - 1 },
                    ext: { width: 150, height: 120 },
                    editAs: 'oneCell'
                });
            }
        }

        // Save file using FileSaver.js
        const buffer = await workbook.xlsx.writeBuffer();
        saveAs(new Blob([buffer]), "Bulk_Images_Front_Back.xlsx");

        downloadBtn.textContent = 'Download Excel File';
        downloadBtn.disabled = false;
    });
</script>

</body>
</html>
